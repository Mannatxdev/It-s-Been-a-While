<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIORITY ACCESS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
</head>
<body>
  <div class="mesh-gradient"></div>

  <div class="app-container">
    <div class="glass-card profile-card">
      <div class="image-container">
        <img src="assets/her.png" class="profile" />
      </div>
      <div class="info-container">
        <div class="dev-header">
          <span class="dev-badge">Lead Developer</span>
          <p class="dev-label">MANNAT • 3rd Year CSE</p>
        </div>
        <h1 class="main-title">FOR: <span>Sadhana</span></h1>
        <p class="status"><span class="dot"></span> Lowkey special person</p>
      </div>
    </div>

    <div class="glass-card timer-card">
      <p class="section-label">It's been</p>
      <h2 id="time">00d 00h 00m 00s</h2>
      <p class="section-subtext">since the vibe got better</p>
    </div>

    <div class="glass-card interaction-card">
      <div class="compliment-box">
        <p id="compliment">"You have the most calming presence."</p>
      </div>
      <button id="btn" class="glow-button">Reveal a Nice Thought </button>
    </div>

    <div class="glass-card footer-card">
      <span>PAID Project - Mannat </span>
      <span>2026</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
